<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jinjer Time Card Helper - 設定</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 18px;
        font-size: 20px;
      }

      .field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 12px 0;
      }

      .field label {
        font-size: 14px;
      }

      .field input[type="color"] {
        width: 52px;
        height: 34px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        padding: 2px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button.primary {
        border-color: #2563eb;
        background: #2563eb;
        color: #fff;
      }

      #status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 13px;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>ハイライト色の設定</h1>

      <div class="field">
        <label for="jinjer-row-bg">行背景色 (`--jinjer-row-bg`)</label>
        <input id="jinjer-row-bg" type="color" />
      </div>

      <div class="field">
        <label for="jinjer-row-border">行枠線色 (`--jinjer-row-border`)</label>
        <input id="jinjer-row-border" type="color" />
      </div>

      <div class="field">
        <label for="jinjer-cell-bg">セル背景色 (`--jinjer-cell-bg`)</label>
        <input id="jinjer-cell-bg" type="color" />
      </div>

      <div class="field">
        <label for="jinjer-cell-border">セル枠線色 (`--jinjer-cell-border`)</label>
        <input id="jinjer-cell-border" type="color" />
      </div>

      <div class="field">
        <label for="jinjer-summary-bg">サマリー背景色 (`--jinjer-summary-bg`)</label>
        <input id="jinjer-summary-bg" type="color" />
      </div>

      <div class="actions">
        <button id="save-button" class="primary" type="button">保存</button>
        <button id="reset-button" type="button">デフォルトに戻す</button>
      </div>

      <p id="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
